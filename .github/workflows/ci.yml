name: Backend Service CI

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: helpingpeoplenow/backend

jobs:
  # ──────────────────────────────────────────────
  # Step 1: Lint (gofmt + go vet + govulncheck)
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: gofmt -l . | tee fmt.out && test ! -s fmt.out
      - run: go vet ./...
      - run: go tool govulncheck ./...

  # ──────────────────────────────────────────────
  # Step 2: Build (type check by compilation)
  # ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go build -o backend .

  # ──────────────────────────────────────────────
  # Step 3: Tests with PostgreSQL service container
  # ──────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint, build]
    permissions:
      contents: read
      pull-requests: write

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/helpingpeoplenow_backend_test?sslmode=disable
      TEST_DB_NAME: helpingpeoplenow_backend_test
      AUTH_SERVICE_URL: http://localhost:9999
      HELPER_TIMEOUT_SECONDS: "5"
      GOFLAGS: -mod=readonly

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download modules
        run: go mod download

      - name: Run tests with coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Enforce coverage thresholds
        if: success() || failure()
        uses: vladopajic/go-test-coverage@v2
        with:
          config: ./.testcoverage.yml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-${{ github.sha }}
          path: coverage.out
          retention-days: 30

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: backend-coverage
          message: |
            ## Backend Service Test Coverage

            | Metric    | Threshold | Status |
            |-----------|-----------|--------|
            | Statements (total) | 80% | ${{ job.status == 'success' && '✅' || '❌' }} |

            Go's coverprofile produces statement coverage only; Lines/Branches/Functions are not independently measured by this toolchain.

            [Full report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  # ──────────────────────────────────────────────
  # Step 4: Build & Push Docker image
  # ──────────────────────────────────────────────
  docker:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=branch
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
