syntax = "proto3";

package helper;

option go_package = "github.com/HelpingPeopleNow/backend/proto/helper";

service HelperService {
  rpc Ask(AskRequest) returns (AskResponse);
}

message Message {
  string role = 1;
  string content = 2;
}

message AskRequest {
  string question = 1;
  repeated Message history = 2;
  string system_prompt = 3;  // loaded by backend, provided on every call
  string llm_provider = 4;   // "ollama" | "opencode" | "" (= use env default, set by admin)
  bool skip_role_detection = 5;  // if true, don't append JSON role-detection instructions
}

message AskResponse {
  string answer = 1;
  string detected_role = 2;  // "worker" | "client" | ""
}
