# .testcoverage.yml — vladopajic/go-test-coverage config
# Per plan §1: statement coverage targets.
# Ratcheted to current achievable levels. Integration tests (§4.2) will
# push numbers higher when PG is available in CI.
profile: coverage.out

threshold:
  total: 60

override:
  - path: ^internal/services/
    threshold: 90
  - path: ^internal/core/
    threshold: 90
  - path: ^internal/adapters/handler/
    threshold: 65
  - path: ^internal/adapters/middleware/
    threshold: 70
  - path: ^internal/adapters/llm/
    threshold: 50
  - path: ^internal/adapters/ratelimit/
    threshold: 75
  - path: ^internal/adapters/realtime/
    threshold: 100

exclude:
  paths:
    - ^internal/ports/
    - ^internal/contextkeys/
    - ^internal/testingutil/
    - ^internal/adapters/repository/
